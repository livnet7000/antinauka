<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2;url=https://www.eprussia.ru/epr/71/4912.htm">
    <title>Переход к материалам книги «Антинаука, как она есть»</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .redirect-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            font-size: 0.95em;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .spinner {
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="redirect-box">
    <h1>Переход к источнику</h1>
    <p>Вы сканировали QR-код из книги «Антинаука, как она есть». Сейчас вы будете перенаправлены на официальный документ.</p>
    
    <div class="spinner"></div>

    <a href="https://www.eprussia.ru/epr/71/4912.htm" class="btn">Перейти вручную</a>
</div>

</body>
</html>
